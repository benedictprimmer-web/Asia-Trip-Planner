<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prague — Places I've Been</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }

    /* Top bar */
    .bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; backdrop-filter: blur(8px);
    }
    .bar h1 { font-size: 15px; margin: 0; flex: 1; font-weight: 600; }
    .themes { display: flex; gap: 6px; }
    .themes button {
      border: 0; border-radius: 20px; padding: 8px 12px; font-size: 13px;
      font-weight: 600; cursor: pointer; opacity: .55; transition: opacity .15s;
    }
    .themes button.active { opacity: 1; }

    /* Banner */
    .banner {
      position: absolute; bottom: 14px; left: 12px; right: 12px; z-index: 1000;
      font-size: 12px; line-height: 1.4; padding: 10px 12px; border-radius: 10px;
      backdrop-filter: blur(8px);
    }

    /* Popup */
    .leaflet-popup-content { margin: 12px 14px; }
    .pname { font-weight: 700; font-size: 15px; }
    .ptype { display: inline-block; font-size: 11px; text-transform: uppercase;
      letter-spacing: .5px; padding: 2px 8px; border-radius: 12px; margin: 6px 0; }
    .pnote { font-size: 13px; color: #444; margin-top: 4px; }
    .ppeople { font-size: 12px; color: #666; margin-top: 6px; }
    .pflag { font-size: 11px; color: #c026d3; margin-top: 6px; font-weight: 600; }

    /* Theme skins for chrome (map tiles handled in JS) */
    body.neon { background: #0f0a14; }
    body.neon .bar, body.neon .banner { background: rgba(20,12,28,.7); color: #f5e9ff; }
    body.neon .themes button { background: #2a1c3a; color: #f5e9ff; }

    body.amber { background: #fbf6ee; }
    body.amber .bar, body.amber .banner { background: rgba(255,250,240,.8); color: #5b4a2e; }
    body.amber .themes button { background: #f1e3cc; color: #5b4a2e; }

    body.teal { background: #eef6f6; }
    body.teal .bar, body.teal .banner { background: rgba(240,250,250,.85); color: #234; }
    body.teal .themes button { background: #d6ecea; color: #234; }
  </style>
</head>
<body class="neon">
  <div id="map"></div>

  <div class="bar">
    <h1>🗺️ Prague — places I've been</h1>
    <div class="themes">
      <button data-theme="neon" class="active">Neon</button>
      <button data-theme="amber">Amber</button>
      <button data-theme="teal">Teal</button>
    </div>
  </div>

  <div class="banner" id="banner">
    📍 Pins are <b>approximate</b> placeholders. Send your Life360 screenshots and I'll snap them to the real spots. Tap a pin for details · tap a theme to compare.
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ---- DATA -------------------------------------------------------------
    // Easy to edit. people = who was there (just you for MVP; James etc. later).
    // approx = true means the coordinate is a guess to be corrected from Life360.
    const PLACES = [
      { name: "Clown and Bard Hostel", type: "hostel",     people: ["Me"], note: "Home base in Žižkov.",        lat: 50.0814, lng: 14.4500, approx: true },
      { name: "Dog Bar",               type: "bar",        people: ["Me"], note: "Was here yesterday.",          lat: 50.0876, lng: 14.4515, approx: true },
      { name: "Oliver's Café",         type: "café",       people: ["Me"], note: "Coffee stop.",                 lat: 50.0800, lng: 14.4452, approx: true },
      { name: "The square (name?)",    type: "landmark",   people: ["Me"], note: "I'm here now — need the name.", lat: 50.0822, lng: 14.4488, approx: true },
    ];

    // ---- THEMES -----------------------------------------------------------
    const THEMES = {
      neon:  { tiles: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
               glow: "#c026d3", pin: "#e879f9", chip: "#3a1d4a", chipText: "#f5e9ff" },
      amber: { tiles: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
               glow: "#f59e0b", pin: "#d97706", chip: "#f1e3cc", chipText: "#5b4a2e" },
      teal:  { tiles: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
               glow: "#14b8a6", pin: "#0d9488", chip: "#d6ecea", chipText: "#234" },
    };
    const ATTRIB = '&copy; OpenStreetMap, &copy; CARTO';

    // ---- MAP --------------------------------------------------------------
    const map = L.map("map", { zoomControl: false }).setView([50.0825, 14.4480], 15);
    L.control.zoom({ position: "bottomright" }).addTo(map);

    let tileLayer = null;
    const glowLayer = L.layerGroup().addTo(map);
    const pinLayer  = L.layerGroup().addTo(map);

    function render(themeName) {
      const t = THEMES[themeName];
      document.body.className = themeName;

      if (tileLayer) map.removeLayer(tileLayer);
      tileLayer = L.tileLayer(t.tiles, { attribution: ATTRIB, maxZoom: 20 }).addTo(map);

      glowLayer.clearLayers();
      pinLayer.clearLayers();

      PLACES.forEach(p => {
        // Glow blob — overlapping ones merge visually into "explored areas".
        L.circle([p.lat, p.lng], {
          radius: 110, color: t.glow, weight: 0,
          fillColor: t.glow, fillOpacity: 0.16,
        }).addTo(glowLayer);

        // Actual point
        const dot = L.circleMarker([p.lat, p.lng], {
          radius: 7, color: "#fff", weight: 2,
          fillColor: t.pin, fillOpacity: 1,
        }).addTo(pinLayer);

        const chip = `background:${t.chip};color:${t.chipText}`;
        dot.bindPopup(`
          <div class="pname">${p.name}</div>
          <span class="ptype" style="${chip}">${p.type}</span>
          <div class="pnote">${p.note}</div>
          <div class="ppeople">👥 ${p.people.join(", ")}</div>
          ${p.approx ? '<div class="pflag">⚠︎ approx location — fix from Life360</div>' : ""}
        `);
      });
    }

    document.querySelectorAll(".themes button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".themes button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render(btn.dataset.theme);
      });
    });

    render("neon");
  </script>
</body>
</html>
