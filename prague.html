<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prague — Places I've Been</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    body { background: #fbf6ee; }
    #map { position: absolute; inset: 0; background: #fbf6ee; }

    .bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 10px 12px; backdrop-filter: blur(8px);
      background: rgba(255,250,240,.82); color: #5b4a2e;
    }
    .bar h1 { font-size: 15px; margin: 0; flex: 1 1 100%; font-weight: 600; }
    .modes { display: flex; gap: 6px; }
    .modes button {
      border: 0; border-radius: 20px; padding: 7px 13px; font-size: 13px;
      font-weight: 600; cursor: pointer; background: #f1e3cc; color: #5b4a2e;
      opacity: .6; transition: opacity .15s;
    }
    .modes button.active { opacity: 1; box-shadow: inset 0 0 0 2px #e58e26; }
    .bar .status { font-size: 11px; opacity: .7; margin-left: auto; }

    .banner {
      position: absolute; bottom: 14px; left: 12px; right: 12px; z-index: 1000;
      font-size: 12px; line-height: 1.4; padding: 10px 12px; border-radius: 10px;
      backdrop-filter: blur(8px); background: rgba(255,250,240,.85); color: #5b4a2e;
    }

    .leaflet-popup-content { margin: 12px 14px; }
    .pname { font-weight: 700; font-size: 15px; }
    .ptype { display: inline-block; font-size: 11px; text-transform: uppercase;
      letter-spacing: .5px; padding: 2px 8px; border-radius: 12px; margin: 6px 0;
      background: #f1e3cc; color: #5b4a2e; }
    .pnote { font-size: 13px; color: #444; margin-top: 4px; }
    .ptime { font-size: 12px; color: #777; margin-top: 4px; }
    .ppeople { font-size: 12px; color: #666; margin-top: 6px; }
    .pflag { font-size: 11px; color: #b45309; margin-top: 6px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="bar">
    <h1>🗺️ Prague — places I've been</h1>
    <div class="modes">
      <button data-mode="places">Places</button>
      <button data-mode="predicted">Predicted</button>
      <button data-mode="real" class="active">Real</button>
    </div>
    <span class="status" id="status"></span>
  </div>

  <div class="banner" id="banner"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ---- DATA -------------------------------------------------------------
    // src: 'named'  -> you told me the place by name (authoritative).
    //      'life360'-> real address from a Life360 screenshot (geocoded, good).
    //      'guess'  -> best estimate, still to be confirmed.
    const PLACES = {
      hostel:    { name: "Clown and Bard Hostel", type: "hostel",   note: "Home base — Bořivojova 758/102, Žižkov.",  time: "your stay", lat: 50.08165, lng: 14.45000, people: ["Me"], src: "named" },
      stepanska: { name: "Štěpánská 611/14",       type: "night out",note: "Long night here, ~5 hrs. Name it?",        time: "Tue 20:42 – 01:35", lat: 50.07990, lng: 14.42600, people: ["Me"], src: "life360" },
      newhall:   { name: "New Town Hall area",     type: "landmark", note: "Taxi home left from here at 2am.",          time: "Tue ~02:04", lat: 50.07840, lng: 14.42060, people: ["Me"], src: "life360" },
      seifert:   { name: "Seifertova 49",          type: "stop",     note: "Taxi to Štěpánská set off here.",          time: "Tue 20:36", lat: 50.08680, lng: 14.44900, people: ["Me"], src: "life360" },
      kubelik:   { name: "Kubelíkova 1780/21",     type: "stop",     note: "~1h20 here. Name it?",                     time: "Wed 13:14 – 14:34", lat: 50.08350, lng: 14.45150, people: ["Me"], src: "life360" },
      stitneho:  { name: "Štítného 139/8",         type: "stop",     note: "Quick 30 min. Name it?",                   time: "Thu 12:46 – 13:16", lat: 50.08760, lng: 14.45350, people: ["Me"], src: "life360" },
      krasova:   { name: "Krásova 1011/20",        type: "stop",     note: "Start of the Thu walk.",                   time: "Thu ~11:59", lat: 50.08520, lng: 14.44950, people: ["Me"], src: "life360" },
      pavlac:    { name: "Café Pavlač",            type: "café",     note: "On the Krásova walk.",                     time: "Thu midday", lat: 50.08550, lng: 14.44800, people: ["Me"], src: "life360" },
      sladkov:   { name: "Sladkovského náměstí",   type: "landmark", note: "The square you were in? (confirm)",         time: "Thu ~12:16", lat: 50.08650, lng: 14.44480, people: ["Me"], src: "life360" },
      dog:       { name: "Dog Bar",                type: "bar",      note: "You named this one.",                      time: "", lat: 50.08800, lng: 14.45000, people: ["Me"], src: "named", approx: true },
      olivers:   { name: "Oliver's Café",          type: "café",     note: "You named this one.",                      time: "", lat: 50.08050, lng: 14.44520, people: ["Me"], src: "named", approx: true },
    };

    // PREDICTED: estimated most-probable roads between places, hostel outward.
    const ROUTE = ["hostel", "kubelik", "stitneho", "krasova", "pavlac", "sladkov", "seifert", "stepanska", "newhall"];

    // REAL: actual Life360-logged trips. mode 'walk' = roads you were on,
    // 'taxi' = a vehicle hop (drawn dashed — roads travelled, not walked).
    const REAL_TRIPS = [
      { from: "krasova", to: "sladkov", mode: "walk", label: "Thu walk past Café Pavlač" },
      { from: "seifert", to: "stepanska", mode: "taxi", label: "Tue 20:36 taxi" },
      { from: "newhall", to: "hostel", mode: "taxi", label: "Tue 02:04 taxi home" },
    ];

    // ---- THEME (amber) ----------------------------------------------------
    const TILES = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";
    const ROAD_GLOW = "#fcd9a0", ROAD_CORE = "#e58e26", PIN_FILL = "#d97706";

    // ---- MAP --------------------------------------------------------------
    const map = L.map("map", { zoomControl: false }).setView([50.0825, 14.4470], 14);
    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer(TILES, { attribution: "&copy; OpenStreetMap, &copy; CARTO", maxZoom: 20 }).addTo(map);

    const predictedLayer = L.layerGroup();
    const realLayer      = L.layerGroup();
    const pinLayer       = L.layerGroup().addTo(map);

    function drawRoad(layer, geometry, { dashed = false } = {}) {
      L.geoJSON(geometry, { style: { color: ROAD_GLOW, weight: 11, opacity: .9, lineCap: "round", lineJoin: "round" } }).addTo(layer);
      L.geoJSON(geometry, { style: { color: ROAD_CORE, weight: 5, opacity: 1, lineCap: "round", lineJoin: "round", dashArray: dashed ? "1 10" : null } }).addTo(layer);
    }
    function drawStraight(layer, latlngs, { dashed = false } = {}) {
      L.polyline(latlngs, { color: ROAD_CORE, weight: 3, opacity: .5, dashArray: dashed ? "4 8" : null }).addTo(layer);
    }

    // ---- OSRM road snapping ----------------------------------------------
    async function fetchRoute(a, b, preferred) {
      const profiles = preferred === "taxi" ? ["driving", "foot"] : ["foot", "driving"];
      for (const profile of profiles) {
        try {
          const url = `https://router.project-osrm.org/route/v1/${profile}/` +
            `${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
          const res = await fetch(url);
          if (!res.ok) continue;
          const j = await res.json();
          if (j.routes && j.routes[0]) return j.routes[0].geometry;
        } catch (e) {}
      }
      return null;
    }

    async function buildPredicted() {
      for (let i = 0; i < ROUTE.length - 1; i++) {
        const a = PLACES[ROUTE[i]], b = PLACES[ROUTE[i + 1]];
        const geom = await fetchRoute(a, b);
        if (geom) drawRoad(predictedLayer, geom, { dashed: true });
        else drawStraight(predictedLayer, [[a.lat, a.lng], [b.lat, b.lng]], { dashed: true });
      }
    }
    async function buildReal() {
      for (const trip of REAL_TRIPS) {
        const a = PLACES[trip.from], b = PLACES[trip.to];
        const geom = await fetchRoute(a, b, trip.mode);
        if (geom) drawRoad(realLayer, geom, { dashed: trip.mode === "taxi" });
        else drawStraight(realLayer, [[a.lat, a.lng], [b.lat, b.lng]], { dashed: trip.mode === "taxi" });
      }
    }

    // ---- NODES ------------------------------------------------------------
    function drawPins() {
      Object.values(PLACES).forEach(p => {
        const dot = L.circleMarker([p.lat, p.lng], { radius: 6, color: "#fff", weight: 2, fillColor: PIN_FILL, fillOpacity: 1 }).addTo(pinLayer);
        dot.bindPopup(`
          <div class="pname">${p.name}</div>
          <span class="ptype">${p.type}</span>
          <div class="pnote">${p.note}</div>
          ${p.time ? `<div class="ptime">🕘 ${p.time}</div>` : ""}
          <div class="ppeople">👥 ${p.people.join(", ")}</div>
          ${p.approx ? '<div class="pflag">⚠︎ approx — confirm location</div>' : ""}
        `);
      });
    }

    // ---- MODE TOGGLE ------------------------------------------------------
    const BANNERS = {
      places:    "📍 Places only — every spot you've been. Tap a pin for details.",
      predicted: "🛣️ Predicted — most-probable roads between places (dashed = estimate, not confirmed).",
      real:      "✅ Real — actual Life360-logged trips. Solid = walked · dashed = taxi.",
    };
    function setMode(mode) {
      map.removeLayer(predictedLayer); map.removeLayer(realLayer);
      if (mode === "predicted") map.addLayer(predictedLayer);
      if (mode === "real") map.addLayer(realLayer);
      document.getElementById("banner").textContent = BANNERS[mode];
      document.querySelectorAll(".modes button").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
    }
    document.querySelectorAll(".modes button").forEach(btn =>
      btn.addEventListener("click", () => setMode(btn.dataset.mode)));

    // ---- GO ---------------------------------------------------------------
    document.getElementById("status").textContent = "tracing roads…";
    drawPins();
    Promise.all([buildPredicted(), buildReal()]).then(() => {
      document.getElementById("status").textContent = "";
    });
    setMode("real");
  </script>
</body>
</html>
