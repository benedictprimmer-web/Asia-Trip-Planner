<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prague — Places I've Been</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    body { background: #fbf6ee; }
    #map { position: absolute; inset: 0; background: #fbf6ee; }

    .bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; backdrop-filter: blur(8px);
      background: rgba(255,250,240,.82); color: #5b4a2e;
    }
    .bar h1 { font-size: 15px; margin: 0; flex: 1; font-weight: 600; }
    .bar .status { font-size: 11px; opacity: .7; }

    .banner {
      position: absolute; bottom: 14px; left: 12px; right: 12px; z-index: 1000;
      font-size: 12px; line-height: 1.4; padding: 10px 12px; border-radius: 10px;
      backdrop-filter: blur(8px); background: rgba(255,250,240,.85); color: #5b4a2e;
    }

    .leaflet-popup-content { margin: 12px 14px; }
    .pname { font-weight: 700; font-size: 15px; }
    .ptype { display: inline-block; font-size: 11px; text-transform: uppercase;
      letter-spacing: .5px; padding: 2px 8px; border-radius: 12px; margin: 6px 0;
      background: #f1e3cc; color: #5b4a2e; }
    .pnote { font-size: 13px; color: #444; margin-top: 4px; }
    .ppeople { font-size: 12px; color: #666; margin-top: 6px; }
    .pflag { font-size: 11px; color: #b45309; margin-top: 6px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="bar">
    <h1>🗺️ Prague — places I've been</h1>
    <span class="status" id="status">tracing roads…</span>
  </div>

  <div class="banner" id="banner">
    📍 Pins are <b>approximate</b> placeholders and the route order is a guess — your Life360 screenshots will fix both. Roads highlighted in amber follow the real streets from the hostel outward.
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ---- DATA -------------------------------------------------------------
    // people = who was there (just you for MVP; James etc. later).
    // approx = true means the coordinate is a guess, to be corrected from Life360.
    const PLACES = {
      hostel:  { name: "Clown and Bard Hostel", type: "hostel",   people: ["Me"], note: "Home base in Žižkov. The route starts here.", lat: 50.0814, lng: 14.4500, approx: true },
      square:  { name: "The square (name?)",    type: "landmark", people: ["Me"], note: "I'm here now — need the name.",            lat: 50.0822, lng: 14.4488, approx: true },
      olivers: { name: "Oliver's Café",         type: "café",     people: ["Me"], note: "Coffee stop.",                              lat: 50.0800, lng: 14.4452, approx: true },
      dog:     { name: "Dog Bar",               type: "bar",      people: ["Me"], note: "Was here yesterday.",                        lat: 50.0876, lng: 14.4515, approx: true },
    };

    // The walked path: an ordered sequence of nodes starting at the hostel.
    // Edit this order (and add more) once Life360 shows the real route.
    const ROUTE = ["hostel", "square", "olivers", "dog"];

    // ---- THEME (amber, locked) -------------------------------------------
    const TILES = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";
    const ROAD_GLOW = "#fcd9a0";   // soft wide underlay
    const ROAD_CORE = "#e58e26";   // saturated amber road
    const PIN_FILL  = "#d97706";

    // ---- MAP --------------------------------------------------------------
    const map = L.map("map", { zoomControl: false }).setView([PLACES.hostel.lat, PLACES.hostel.lng], 15);
    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer(TILES, { attribution: "&copy; OpenStreetMap, &copy; CARTO", maxZoom: 20 }).addTo(map);

    const roadLayer = L.layerGroup().addTo(map);
    const pinLayer  = L.layerGroup().addTo(map);

    // ---- ROADS: snap each segment to real streets via OSRM ---------------
    async function fetchRoute(a, b) {
      for (const profile of ["foot", "driving"]) {
        try {
          const url = `https://router.project-osrm.org/route/v1/${profile}/` +
            `${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
          const res = await fetch(url);
          if (!res.ok) continue;
          const j = await res.json();
          if (j.routes && j.routes[0]) return j.routes[0].geometry; // GeoJSON LineString
        } catch (e) { /* try next profile */ }
      }
      return null; // fall back to a straight hint line
    }

    function drawSegment(geometry, straightEnds) {
      if (geometry) {
        // wide soft underlay
        L.geoJSON(geometry, { style: { color: ROAD_GLOW, weight: 11, opacity: .9, lineCap: "round", lineJoin: "round" } }).addTo(roadLayer);
        // saturated core
        L.geoJSON(geometry, { style: { color: ROAD_CORE, weight: 5,  opacity: 1,  lineCap: "round", lineJoin: "round" } }).addTo(roadLayer);
      } else {
        // routing unavailable — faint dashed straight line so the link still reads
        L.polyline(straightEnds, { color: ROAD_CORE, weight: 3, opacity: .5, dashArray: "4 8" }).addTo(roadLayer);
      }
    }

    async function buildRoads() {
      for (let i = 0; i < ROUTE.length - 1; i++) {
        const a = PLACES[ROUTE[i]], b = PLACES[ROUTE[i + 1]];
        const geom = await fetchRoute(a, b);
        drawSegment(geom, [[a.lat, a.lng], [b.lat, b.lng]]);
      }
      document.getElementById("status").textContent = "";
    }

    // ---- NODES ------------------------------------------------------------
    function drawPins() {
      Object.values(PLACES).forEach(p => {
        const dot = L.circleMarker([p.lat, p.lng], {
          radius: 6, color: "#fff", weight: 2, fillColor: PIN_FILL, fillOpacity: 1,
        }).addTo(pinLayer);
        dot.bindPopup(`
          <div class="pname">${p.name}</div>
          <span class="ptype">${p.type}</span>
          <div class="pnote">${p.note}</div>
          <div class="ppeople">👥 ${p.people.join(", ")}</div>
          ${p.approx ? '<div class="pflag">⚠︎ approx location — fix from Life360</div>' : ""}
        `);
      });
    }

    drawPins();
    buildRoads();
  </script>
</body>
</html>
