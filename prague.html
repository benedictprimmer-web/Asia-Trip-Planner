<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prague — Places I've Been</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    body { background: #fbf6ee; }
    #map { position: absolute; inset: 0; background: #fbf6ee; }

    .bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 10px 12px; backdrop-filter: blur(8px);
      background: rgba(255,250,240,.82); color: #5b4a2e;
    }
    .bar h1 { font-size: 15px; margin: 0; flex: 1 1 100%; font-weight: 600; }
    .modes { display: flex; gap: 6px; }
    .modes button {
      border: 0; border-radius: 20px; padding: 7px 13px; font-size: 13px;
      font-weight: 600; cursor: pointer; background: #f1e3cc; color: #5b4a2e;
      opacity: .6; transition: opacity .15s;
    }
    .modes button.active { opacity: 1; box-shadow: inset 0 0 0 2px #e58e26; }
    .bar .status { font-size: 11px; opacity: .7; margin-left: auto; }

    .banner {
      position: absolute; bottom: 14px; left: 12px; right: 12px; z-index: 1000;
      font-size: 12px; line-height: 1.4; padding: 10px 12px; border-radius: 10px;
      backdrop-filter: blur(8px); background: rgba(255,250,240,.85); color: #5b4a2e;
    }

    .leaflet-popup-content { margin: 12px 14px; }
    .pname { font-weight: 700; font-size: 15px; }
    .ptype { display: inline-block; font-size: 11px; text-transform: uppercase;
      letter-spacing: .5px; padding: 2px 8px; border-radius: 12px; margin: 6px 0;
      background: #f1e3cc; color: #5b4a2e; }
    .pnote { font-size: 13px; color: #444; margin-top: 4px; }
    .ppeople { font-size: 12px; color: #666; margin-top: 6px; }
    .pflag { font-size: 11px; color: #b45309; margin-top: 6px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="bar">
    <h1>🗺️ Prague — places I've been</h1>
    <div class="modes">
      <button data-mode="places">Places</button>
      <button data-mode="predicted" class="active">Predicted</button>
      <button data-mode="real">Real</button>
    </div>
    <span class="status" id="status"></span>
  </div>

  <div class="banner" id="banner"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ---- DATA -------------------------------------------------------------
    // named=true  -> location is authoritative (you told me the place by name).
    // approx=true -> best-estimate location, to be refined from Life360.
    const PLACES = {
      hostel:  { name: "Clown and Bard Hostel", type: "hostel",   people: ["Me"], note: "Home base in Žižkov. The route starts here.", lat: 50.0814, lng: 14.4500, named: true },
      square:  { name: "The square (name?)",    type: "landmark", people: ["Me"], note: "Need the name.",                              lat: 50.0822, lng: 14.4488, approx: true },
      olivers: { name: "Oliver's Café",         type: "café",     people: ["Me"], note: "Coffee stop.",                              lat: 50.0800, lng: 14.4452, approx: true },
      dog:     { name: "Dog Bar",               type: "bar",      people: ["Me"], note: "Was here.",                                  lat: 50.0876, lng: 14.4515, named: true },
    };

    // PREDICTED: ordered places -> most-probable roads (OSRM). Edit freely.
    const ROUTE = ["hostel", "square", "olivers", "dog"];

    // REAL: actual walked trails traced from Life360. Each = { path:[[lat,lng]...], mode }.
    // mode 'walk' = roads you were on; 'taxi' = a hop (drawn dashed, not a walked road).
    // Empty until Life360 screenshots arrive.
    const REAL_TRAILS = [];

    // ---- THEME (amber) ----------------------------------------------------
    const TILES = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";
    const ROAD_GLOW = "#fcd9a0", ROAD_CORE = "#e58e26", PIN_FILL = "#d97706";

    // ---- MAP --------------------------------------------------------------
    const map = L.map("map", { zoomControl: false }).setView([PLACES.hostel.lat, PLACES.hostel.lng], 15);
    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer(TILES, { attribution: "&copy; OpenStreetMap, &copy; CARTO", maxZoom: 20 }).addTo(map);

    const predictedLayer = L.layerGroup();
    const realLayer      = L.layerGroup();
    const pinLayer       = L.layerGroup().addTo(map);

    // ---- shared road drawing ---------------------------------------------
    function drawRoad(layer, geometry, { dashed = false } = {}) {
      L.geoJSON(geometry, { style: { color: ROAD_GLOW, weight: 11, opacity: .9, lineCap: "round", lineJoin: "round" } }).addTo(layer);
      L.geoJSON(geometry, { style: { color: ROAD_CORE, weight: 5, opacity: 1, lineCap: "round", lineJoin: "round", dashArray: dashed ? "1 10" : null } }).addTo(layer);
    }
    function drawPathLine(layer, latlngs, { dashed = false } = {}) {
      L.polyline(latlngs, { color: ROAD_GLOW, weight: 11, opacity: .9, lineCap: "round", lineJoin: "round" }).addTo(layer);
      L.polyline(latlngs, { color: ROAD_CORE, weight: 5, opacity: 1, lineCap: "round", lineJoin: "round", dashArray: dashed ? "1 10" : null }).addTo(layer);
    }

    // ---- PREDICTED: snap each segment to real streets via OSRM ------------
    async function fetchRoute(a, b) {
      for (const profile of ["foot", "driving"]) {
        try {
          const url = `https://router.project-osrm.org/route/v1/${profile}/` +
            `${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
          const res = await fetch(url);
          if (!res.ok) continue;
          const j = await res.json();
          if (j.routes && j.routes[0]) return j.routes[0].geometry;
        } catch (e) {}
      }
      return null;
    }
    async function buildPredicted() {
      document.getElementById("status").textContent = "tracing roads…";
      for (let i = 0; i < ROUTE.length - 1; i++) {
        const a = PLACES[ROUTE[i]], b = PLACES[ROUTE[i + 1]];
        const geom = await fetchRoute(a, b);
        if (geom) drawRoad(predictedLayer, geom, { dashed: true });
        else drawPathLine(predictedLayer, [[a.lat, a.lng], [b.lat, b.lng]], { dashed: true });
      }
      document.getElementById("status").textContent = "";
    }

    // ---- REAL: draw traced Life360 trails --------------------------------
    function buildReal() {
      REAL_TRAILS.forEach(t => drawPathLine(realLayer, t.path, { dashed: t.mode === "taxi" }));
    }

    // ---- NODES ------------------------------------------------------------
    function drawPins() {
      Object.values(PLACES).forEach(p => {
        const dot = L.circleMarker([p.lat, p.lng], { radius: 6, color: "#fff", weight: 2, fillColor: PIN_FILL, fillOpacity: 1 }).addTo(pinLayer);
        dot.bindPopup(`
          <div class="pname">${p.name}</div>
          <span class="ptype">${p.type}</span>
          <div class="pnote">${p.note}</div>
          <div class="ppeople">👥 ${p.people.join(", ")}</div>
          ${p.approx ? '<div class="pflag">⚠︎ approx location — fix from Life360</div>' : ""}
        `);
      });
    }

    // ---- MODE TOGGLE ------------------------------------------------------
    const BANNERS = {
      places:    "📍 Places only — the nodes you've been to. Switch to Predicted or Real to see the roads.",
      predicted: "🛣️ Predicted — the most-probable roads between places (dashed = an estimate, not confirmed).",
      real:      "✅ Real — the actual roads you were on, traced from Life360. (Empty until screenshots arrive.)",
    };
    function setMode(mode) {
      map.removeLayer(predictedLayer); map.removeLayer(realLayer);
      if (mode === "predicted") map.addLayer(predictedLayer);
      if (mode === "real") map.addLayer(realLayer);
      document.getElementById("banner").textContent = BANNERS[mode];
      document.querySelectorAll(".modes button").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
    }
    document.querySelectorAll(".modes button").forEach(btn =>
      btn.addEventListener("click", () => setMode(btn.dataset.mode)));

    // ---- GO ---------------------------------------------------------------
    drawPins();
    buildPredicted();
    buildReal();
    setMode("predicted");
  </script>
</body>
</html>
